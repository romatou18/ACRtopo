<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ Topo - DMS & Decimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container { position: relative; padding-bottom: 75%; height: 0; overflow: hidden; }
        .map-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="bg-slate-100 p-5 font-sans">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-2 text-emerald-700">NZ Topo Finder</h1>
        <p class="text-xs text-gray-500 mb-4">Supports Decimal (-42.9) or DMS (42° 54' S)</p>
        
        <label class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
        <input type="text" id="latInput" placeholder="e.g. 42 54 01 S or -42.900" 
               class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-emerald-500 outline-none">

        <label class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
        <input type="text" id="lngInput" placeholder="e.g. 171 35 34 E or 171.592" 
               class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-emerald-500 outline-none">
        
        <button onclick="processCoords()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">
            Generate Map Link
        </button>

        <div id="resultArea" class="mt-6 hidden">
            <div class="bg-emerald-50 p-3 rounded mb-4 border border-emerald-100">
                <p class="text-xs font-bold text-emerald-800 uppercase">Parsed Decimal:</p>
                <p id="decimalDisplay" class="text-sm text-emerald-900 font-mono"></p>
            </div>
            
            <a id="topoLink" href="#" target="_blank" class="text-blue-600 break-all underline text-sm block mb-4 italic">Open in Full Screen →</a>
            
            <div class="map-container rounded-lg border shadow-inner bg-gray-200">
                <iframe id="mapFrame" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        function dmsToDecimal(dmsStr) {
            if (!dmsStr) return null;
            
            // Check if it's already a simple decimal number
            if (!isNaN(dmsStr) && dmsStr.trim() !== "") return parseFloat(dmsStr);

            // Regex to find numbers for Degrees, Minutes, Seconds
            const parts = dmsStr.match(/(\d+(\.\d+)?)/g);
            if (!parts) return parseFloat(dmsStr); // Fallback

            let degrees = parseFloat(parts[0]) || 0;
            let minutes = parseFloat(parts[1]) || 0;
            let seconds = parseFloat(parts[2]) || 0;

            let decimal = degrees + (minutes / 60) + (seconds / 3600);

            // Handle South or West hemispheres
            if (/[SWsw]/.test(dmsStr) || parseFloat(parts[0]) < 0) {
                decimal = -Math.abs(decimal);
            }

            return decimal.toFixed(6);
        }

        function processCoords() {
            const rawLat = document.getElementById('latInput').value;
            const rawLng = document.getElementById('lngInput').value;

            const lat = dmsToDecimal(rawLat);
            const lng = dmsToDecimal(rawLng);

            if (isNaN(lat) || isNaN(lng))
